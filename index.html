<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wherehere | 오늘의 장소 추천</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <p class="eyebrow">WHEREHERE</p>
      <h1>오늘은 어디로 갈까?</h1>
      <p class="hero-copy">
        오늘의 장소는 딱 한 곳만 보여드립니다.
        사람들의 의견을 묻지 않고, 오늘 날짜를 기준으로 바로 갈 만한 한 장소만 간결하게 추천합니다.
      </p>
    </section>

    <section class="recommendation-panel" aria-live="polite">
      <div class="recommendation-card">
        <div class="card-topline">
          <p class="section-label">TODAY'S PLACE</p>
          <p class="date-text" id="date-text"></p>
        </div>
        <div class="card-body">
          <div>
            <p class="place-tag" id="place-tag"></p>
            <h2 id="place-name"></h2>
            <p class="place-summary" id="place-summary"></p>
          </div>
          <div class="detail-grid">
            <div class="detail-item">
              <span>추천 시간</span>
              <strong id="best-time"></strong>
            </div>
            <div class="detail-item">
              <span>이런 날 좋아요</span>
              <strong id="good-for"></strong>
            </div>
            <div class="detail-item">
              <span>예상 분위기</span>
              <strong id="vibe"></strong>
            </div>
            <div class="detail-item">
              <span>추천 포인트</span>
              <strong id="highlight"></strong>
            </div>
          </div>
        </div>
      </div>

      <aside class="companion-card">
        <p class="section-label">QUICK GUIDE</p>
        <h3>오늘 이렇게 움직여보세요</h3>
        <ul id="tip-list"></ul>
      </aside>
    </section>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
