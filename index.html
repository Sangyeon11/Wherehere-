<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wherehere | 오늘의 장소 추천</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link href="./style.css" rel="stylesheet" />
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <p class="eyebrow">WHEREHERE</p>
      <h1>오늘은 어디로 갈까?</h1>
      <p class="hero-copy">
        Kakao Places 기준으로 현재 위치 근처의 실제 장소 한 곳만 추천합니다.
        오늘은 추상적인 분위기 대신, 바로 찾아갈 수 있는 구체적인 장소명을 보여줍니다.
      </p>
      <p class="status-text" id="status-text">현재 위치와 Kakao Places를 확인하는 중입니다.</p>
      <div class="login-strip">
        <button class="kakao-login-button" id="kakao-login-button" type="button">카카오 로그인 시작</button>
        <div class="login-meta">
          <p class="login-status" id="login-status">카카오 로그인 준비 중입니다.</p>
          <p class="login-detail" id="login-detail">JavaScript 키와 Redirect URI가 모두 등록되어야 로그인 요청이 동작합니다.</p>
        </div>
      </div>
    </section>

    <section class="recommendation-panel" aria-live="polite">
      <div class="recommendation-card">
        <div class="card-topline">
          <p class="section-label">TODAY'S PLACE</p>
          <p class="date-text" id="date-text"></p>
        </div>
        <div class="card-body">
          <div>
            <p class="place-tag" id="place-tag"></p>
            <h2 id="place-name"></h2>
            <p class="place-summary" id="place-summary"></p>
            <a class="place-link" id="place-link" href="#" target="_blank" rel="noreferrer">카카오맵에서 보기</a>
          </div>
          <div class="detail-grid">
            <div class="detail-item">
              <span>주소</span>
              <strong id="place-address"></strong>
            </div>
            <div class="detail-item">
              <span>현재 위치에서</span>
              <strong id="place-distance"></strong>
            </div>
            <div class="detail-item">
              <span>카카오 분류</span>
              <strong id="place-category"></strong>
            </div>
            <div class="detail-item">
              <span>연락처</span>
              <strong id="place-phone"></strong>
            </div>
          </div>
        </div>
      </div>

      <aside class="companion-card">
        <p class="section-label">QUICK GUIDE</p>
        <h3>오늘 이렇게 움직여보세요</h3>
        <ul id="tip-list"></ul>
      </aside>
    </section>
  </main>

  <script defer type="text/javascript" src="./config.js"></script>
  <script defer type="text/javascript" src="./main.js"></script>
</body>
</html>
